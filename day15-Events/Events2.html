<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mydiv{
            margin-top: 15px;
            width: 200px;
            height: 200px;
            background-color: blue;
            overflow: auto;
        }

        .content{
            height: 300px;
        }
    </style>
</head>
<body>
    <h2>Welcome To Event</h2>

    <input id="myInput" placeholder="Type Something To Search....">
       
    <div id="mydiv">
        <div class="content">Scroll Inside Me</div>
    </div>

    <script>
         //Step 1 : Select Element
         const input = document.getElementById("myInput")

         const div = document.getElementById("mydiv")



         //Step 2:Capture The Event./Action

         //1. keyup - When key is released you get Output

        //  input.addEventListener('keyup', function(e){
        //     console.log('Key Released - ' +  e.key )
        //  })


          //2. keydown - When key is Pressed You get output

        //  input.addEventListener('keydown', function(x){

        //     console.log('Key Released - ' +  x.key )

        //  })


        //3.change : chnage Happening in the input
         input.addEventListener('change', function(y){

            console.log('Value of Input - ' +  y.target.value )
            
         })


         //4. mouseover - Moiving Mouse on something
         div.addEventListener('mouseover', function(){
            div.style.backgroundColor = "green"
         })

         //5.mouseout 
         div.addEventListener('mouseout', function(){
            div.style.backgroundColor = "red"
         })







    </script>
</body>
</html>
