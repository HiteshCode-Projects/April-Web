<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="myp">This is a paragraph.</p>

    <div class="myc">This is Div - 0</div>
    <div class="myc">This is Div - 1</div>

    <p>This is Paragraph - 1</p>
    <p>This is Paragraph - 2</p>

    <div class="box">HTML</div>
    <div class="box">Javascript</div>

    <script>
      // Select Element/Tag From HTML

      //1. getElementById("Value of Id")
      // document - webpage in js
      // textContent - Content of Tag

        const ele  =  document.getElementById("myp")
        console.log(ele)
        console.log(ele.textContent)

      //2. className("Value of Class")
        const abc  =  document.getElementsByClassName("myc")

        console.log(abc)
        console.log(abc[1].textContent)

      //3. TagName("Value")
        const  xyz  = document.getElementsByTagName("p")  
        console.log(xyz)

      //4. QuerySelector() - Follows The Rule of CSS Selector - .class , #Id , TagName
      // Only Select the First Element - 1 Tag

        const pqr =  document.querySelector(".box")
        console.log(pqr)


     //5.QuerySelectAll() - All The Elements/Tag
         const mnp =  document.querySelectorAll(".box")
        console.log(mnp)

    </script>
</body>
</html>
