<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
</head>
<body>
    <h1>Login</h1>

    <form id="loginForm">
          Name:<input type="text" id="name" >
          Email:<input type="email" id="email" >
          <button type="submit">Submit</button>
    </form>

    <p id="resMsg"></p>

    <script>
       document.getElementById('loginForm').addEventListener('submit' , function(event){

            event.preventDefault()  //Avoid Reloading The PAge

            name = document.getElementById('name').value
            email = document.getElementById('email').value


            //Connection with Backend- Reponse SYNTAX
            // fetch('Backend Address APi- Method',{
            //      method:'Method Name',
            //      headers:{
            //         'Content-Type':'application/json'
            //      },

            //      body:  Value of Data Whihc you want to send To Server {name , email}
            // })


            fetch('http://localhost:3000/login',{
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },

                body: JSON.stringify({name,email})
            })

            .then(response => response.json())
            .then(data =>{
                document.getElementById("resMsg").textContent = data.message + " " + data.loginTime
            })


            .catch(error => console.error('Error ' , error))

       })


     </script>   
</body>
</html>
