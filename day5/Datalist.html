<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- DataList - Shows the list of the data as per Input -->

    <label>Choose Your Country:</label>
    <input list="country" >

    <datalist id="country">
        <option value="India">
        <option value="Iran">
        <option value="Italy">
        <option value="Russia">
        <option value="Kenya">
        <option value="Ghana">      
    </datalist>


     <datalist id="food">
        <option value="Pizza">
        <option value="Burger">
        <option value="Coke">  
    </datalist>
</body>
</html>
