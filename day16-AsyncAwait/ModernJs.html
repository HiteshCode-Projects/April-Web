<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Template String
        var a = "John"
        //Old way
        console.log("My Name is " , a)

        //New Way- ${VariableName/ParameterName}
        console.log(`My Name is ${a}   `)


        //Arrow function

        //old way - function 

        //new Way - 

       var abc = ()=>{
           console.log("Hello I am Arrow")
           }

           abc()

         
         // setTimeout(Set The Timer Function , Time 1 sec- 1000) 
         
         setTimeout(()=>{
            console.log("I will Run After 3 seconds")
         }, 3000 )



    </script>
</body>
</html>
