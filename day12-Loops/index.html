<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //Loop : Our Loop Must Be Stopped
        // ++ Increment/Increase Value By 1
        // -- Decrement/Decrease value By 1

        //Task - Print Number 1 to 10 in your console
        // console.log(1)
        // console.log(2)  
        // console.log(3)
        //.....  

        //1. for loop
        //syntax : for(start point; ending/condition point ; ++ or --)

        //Task Print Number 1 to 10 using for loop

        for(let i = 1  ; i <= 10 ; i++ ){
            //Body - Task
            console.log("The Value is " ,  i)

        }

        //Print : Print Number 10 to 1
        for(let y=10; y >=1 ; y--){
             
            console.log("Reverse Order " , y)
        }


        //2. While Loop - Entry Controlled Loop
        //syntax - while(condtion){

         //}
         //When Condtion is True While Loop will STart , When It becomes false it stopped
          
         let count = 1

         while(count<=5){
            console.log("Hello Guys")
            count++
         }


         //3. Do While Loop - Exit Controlled Loop
         // It will Run/Execute Your Code ATLEAST FOR ONE TIME , Even if your condition is false

         let number = 7

         do{
            console.log("Hii I am DO While Loop")
         }while(number < 5)




         







    </script>
</body>
</html>
