 <link rel="stylesheet" href="style.css">

<body>
    <div class="container">
        <h1>Mood Movie Finder</h1>
        <p>Select Your Mood and Get The Movie Recommendation</p>


        <div class="mood-button">

            <button  data-mood="action">Excited 🤩</button>
            <button  data-mood="romance">Romantic 🥰</button>
            <button  data-mood="horror">Scared 👻</button>
        </div>

        <div id="movies-container">
        
        </div>

    </div>


    <script  src="script.js" ></script>
</body>
